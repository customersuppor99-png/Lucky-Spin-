<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আপনার ভাগ্য পরীক্ষা করুন - লাকি স্পিন</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        h1 { text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            border: 10px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .spin-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: #ff4757;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .spin-btn:hover { background: #ff6b81; transform: scale(1.05); }
        .spin-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* রেজাল্ট কার্ড */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            z-index: 100;
            width: 80%;
            max-width: 400px;
        }

        .whatsapp-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>আপনার ভাগ্যটি পরীক্ষা করুন</h1>
    <p>চাকাটি ঘুরিয়ে জিতে নিন আকর্ষণীয় পুরস্কার!</p>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel"></canvas>
    </div>

    <button class="spin-btn" id="spin-trigger">স্পিন করুন</button>

    <div id="result-modal">
        <h2 style="color: #e67e22;">অভিনন্দন! 🎉</h2>
        <p>আপনি জিতেছেন: <strong>২০ টাকা পুরস্কার</strong></p>
        <p>পুরস্কারটি বুঝে নিতে এখনই আমাদের হোয়াটসঅ্যাপে যোগাযোগ করুন:</p>
        <a href="https://wa.me/8801328627572" class="whatsapp-link">যোগাযোগ করুন: 01328627572</a>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-trigger');
        const modal = document.getElementById('result-modal');

        const prizes = ["আইফোন", "ফ্রিজ", "২০ টাকা", "টিভি", "ল্যাপটপ", "২০ টাকা", "এসি", "২০ টাকা"];
        const colors = ["#f1c40f", "#e67e22", "#e74c3c", "#9b59b6", "#3498db", "#2ecc71", "#1abc9c", "#34495e"];
        
        const size = 350;
        canvas.width = size;
        canvas.height = size;
        const center = size / 2;

        // চাকা আঁকার ফাংশন
        function drawWheel() {
            const arc = Math.PI / (prizes.length / 2);
            for (let i = 0; i < prizes.length; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(center, center);
                ctx.arc(center, center, center, i * arc, (i + 1) * arc);
                ctx.fill();
                
                // টেক্সট যোগ করা
                ctx.save();
                ctx.fillStyle = "white";
                ctx.translate(center, center);
                ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right";
                ctx.font = "bold 16px Hind Siliguri";
                ctx.fillText(prizes[i], center - 20, 10);
                ctx.restore();
            }
        }

        drawWheel();

        btn.addEventListener('click', () => {
            btn.disabled = true;
            
            // লজিক: সবসময় ২০ টাকা (ইনডেক্স ২, ৫ অথবা ৭) এ থামবে
            // আমরা ইনডেক্স ২ (২০ টাকা) টার্গেট করছি। 
            // ৩৬০ ডিগ্রি এর হিসেবে হিসাব করে চাকা ঘোরানো
            const segments = prizes.length;
            const degreesPerSegment = 360 / segments;
            
            // ২০ টাকা সেগমেন্টে থামানোর জন্য ক্যালকুলেশন
            const targetSegment = 2; // ২০ টাকা
            const rotation = (360 * 5) + (360 - (targetSegment * degreesPerSegment)) - (degreesPerSegment / 2);
            
            canvas.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                // ফুল পড়ার ইফেক্ট (Confetti)
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 }
                });
                
                // রেজাল্ট দেখানো
                setTimeout(() => {
                    modal.style.display = 'block';
                }, 1000);
            }, 5000);
        });
    </script>
</body>
  </html>
